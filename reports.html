<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Analytics and Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Population Analytics and Reports</h1>
    <div>
        <h2>Population by Gender</h2>
        <canvas id="genderChart"></canvas>
    </div>
    <div>
        <h2>Population by Age Groups</h2>
        <canvas id="ageChart"></canvas>
    </div>
    <div>
        <h2>Village Distribution</h2>
        <canvas id="villageChart"></canvas>
    </div>
    <script>
        const ctxGender = document.getElementById('genderChart').getContext('2d');
        const genderChart = new Chart(ctxGender, {
            type: 'pie',
            data: {
                labels: ['Male', 'Female'],
                datasets: [{
                    label: 'Population by Gender',
                    data: [65, 35], // Example data; replace with actual population data
                    backgroundColor: ['#36A2EB', '#FF6384']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                }
            }
        });

        const ctxAge = document.getElementById('ageChart').getContext('2d');
        const ageChart = new Chart(ctxAge, {
            type: 'bar',
            data: {
                labels: ['0-5', '6-12', '13-17', '18-35', '36-60', '60+'],
                datasets: [{
                    label: 'Population by Age Groups',
                    data: [10, 20, 15, 30, 25, 5], // Example data; replace with actual age group data
                    backgroundColor: '#FFCE56'
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        const ctxVillage = document.getElementById('villageChart').getContext('2d');
        const villageChart = new Chart(ctxVillage, {
            type: 'line',
            data: {
                labels: ['Village A', 'Village B', 'Village C'],
                datasets: [{
                    label: 'Village Distribution',
                    data: [100, 150, 200], // Example data; replace with actual village distribution data
                    fill: false,
                    borderColor: '#4BC0C0'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                }
            }
        });
    </script>
</body>
</html>
