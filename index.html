<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@1.9.6/dist/tailwind.min.css" rel="stylesheet">\n    <title>Login</title>\n</head>\n<body class="bg-gray-100 flex items-center justify-center h-screen">\n    <div class="w-full max-w-xs">\n        <form class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4" action="/login" method="POST">\n            <h1 class="text-center text-2xl mb-6">Login</h1>\n            <div class="mb-4">\n                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>\n                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="email" type="email" placeholder="Email" required>\n            </div>\n            <div class="mb-6">\n                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>\n                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="Password" required>\n                <p class="text-red-500 text-xs italic hidden">Please choose a password.</p>\n            </div>\n            <div class="flex items-center justify-between">\n                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">\n                    Submit\n                </button>\n            </div>\n        </form>\n        <p class="text-center">\n            Don't have an account? \n            <a class="text-blue-500 hover:text-blue-800" href="/signup">Sign Up</a>\n        </p>\n    </div>\n</body>\n</html>\n
